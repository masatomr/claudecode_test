<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ランダムポケモン</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');

    :root {
      --type1: #7c7cff;
      --type2: #7c7cff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', 'Hiragino Sans', sans-serif;
      background: #0d0d1a;
      overflow-x: hidden;
      padding: 24px;
    }

    /* Animated background blobs */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }
    .bg-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      transition: background 1.2s ease, transform 1.2s ease;
    }
    .bg-blob-1 {
      width: 500px; height: 500px;
      top: -100px; left: -100px;
      background: var(--type1);
      animation: drift1 8s ease-in-out infinite;
    }
    .bg-blob-2 {
      width: 400px; height: 400px;
      bottom: -80px; right: -80px;
      background: var(--type2);
      animation: drift2 10s ease-in-out infinite;
    }
    @keyframes drift1 {
      0%,100% { transform: translate(0,0) scale(1); }
      50%      { transform: translate(40px, 30px) scale(1.1); }
    }
    @keyframes drift2 {
      0%,100% { transform: translate(0,0) scale(1); }
      50%      { transform: translate(-30px,-40px) scale(1.08); }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 32px;
      padding: 36px 36px 28px;
      backdrop-filter: blur(24px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.06),
        0 32px 80px rgba(0,0,0,0.6),
        0 0 60px -20px var(--type1);
      transition: box-shadow 1s ease;
    }

    /* Top row: number + name */
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 4px;
    }
    .pokemon-number {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.25);
      padding: 4px 10px;
      background: rgba(255,255,255,0.06);
      border-radius: 20px;
    }
    .types {
      display: flex;
      gap: 6px;
    }
    .type-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* Pokemon name */
    .pokemon-name {
      font-size: 2.2rem;
      font-weight: 900;
      text-transform: capitalize;
      color: #fff;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-top: 16px;
      min-height: 2.6rem;
    }
    .pokemon-name-ja {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.4);
      margin-top: 4px;
      min-height: 1.4rem;
      font-weight: 400;
    }

    /* Image area */
    .image-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 200px;
      margin: 8px 0 16px;
    }
    .pokeball-bg {
      position: absolute;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 38%, rgba(255,255,255,0.06) 0%, transparent 70%);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .pokemon-image {
      position: relative;
      z-index: 1;
      width: 180px;
      height: 180px;
      object-fit: contain;
      filter: drop-shadow(0 12px 32px rgba(0,0,0,0.5));
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .pokemon-image.hidden { opacity: 0; transform: scale(0.85) translateY(12px); }
    .pokemon-image.visible { opacity: 1; transform: scale(1) translateY(0); }

    /* Stats */
    .stats-title {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      color: rgba(255,255,255,0.25);
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .stats {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-bottom: 20px;
    }
    .stat-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .stat-label {
      font-size: 0.7rem;
      font-weight: 600;
      color: rgba(255,255,255,0.35);
      width: 52px;
      flex-shrink: 0;
      text-align: right;
    }
    .stat-value {
      font-size: 0.8rem;
      font-weight: 700;
      color: rgba(255,255,255,0.8);
      width: 28px;
      flex-shrink: 0;
      text-align: right;
    }
    .stat-bar-wrap {
      flex: 1;
      height: 5px;
      background: rgba(255,255,255,0.07);
      border-radius: 10px;
      overflow: hidden;
    }
    .stat-bar {
      height: 100%;
      border-radius: 10px;
      background: linear-gradient(90deg, var(--type1), var(--type2));
      transition: width 0.8s cubic-bezier(0.16,1,0.3,1);
      width: 0%;
    }

    /* Info row */
    .info-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .info-item {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px;
      padding: 10px 14px;
      text-align: center;
    }
    .info-label {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.25);
      text-transform: uppercase;
      margin-bottom: 3px;
    }
    .info-value {
      font-size: 0.95rem;
      font-weight: 700;
      color: rgba(255,255,255,0.85);
    }

    /* Button */
    .btn-wrap {
      position: relative;
    }
    .btn-glow {
      position: absolute;
      inset: -2px;
      border-radius: 50px;
      background: linear-gradient(135deg, var(--type1), var(--type2));
      filter: blur(12px);
      opacity: 0.5;
      transition: opacity 0.2s, background 1s;
    }
    .btn {
      position: relative;
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--type1), var(--type2));
      color: #fff;
      border: none;
      border-radius: 50px;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      cursor: pointer;
      transition: all 0.2s ease, background 1s;
      text-transform: uppercase;
    }
    .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
    .btn:active { transform: translateY(0); filter: brightness(0.95); }
    .btn:disabled {
      cursor: not-allowed;
      filter: brightness(0.6);
      transform: none;
    }

    /* Loading spinner */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Placeholder shimmer */
    .shimmer {
      background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 8px;
      color: transparent !important;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* type colors */
    .type-normal     { background: #9099a1; color: #fff; }
    .type-fire       { background: #ff9c54; color: #fff; }
    .type-water      { background: #4d90d5; color: #fff; }
    .type-electric   { background: #f3d23b; color: #333; }
    .type-grass      { background: #63bc5a; color: #fff; }
    .type-ice        { background: #74cec0; color: #fff; }
    .type-fighting   { background: #ce406a; color: #fff; }
    .type-poison     { background: #ab6ac8; color: #fff; }
    .type-ground     { background: #d97845; color: #fff; }
    .type-flying     { background: #8fa8dd; color: #fff; }
    .type-psychic    { background: #f97176; color: #fff; }
    .type-bug        { background: #91c12f; color: #fff; }
    .type-rock       { background: #c7b78b; color: #fff; }
    .type-ghost      { background: #5269ac; color: #fff; }
    .type-dragon     { background: #0a6dc4; color: #fff; }
    .type-dark       { background: #5a5465; color: #fff; }
    .type-steel      { background: #5a8ea2; color: #fff; }
    .type-fairy      { background: #ec8fe6; color: #fff; }
  </style>
</head>
<body>
  <div class="bg">
    <div class="bg-blob bg-blob-1"></div>
    <div class="bg-blob bg-blob-2"></div>
  </div>

  <div class="card" id="card">
    <div class="card-header">
      <div class="pokemon-number" id="number">#0000</div>
      <div class="types" id="types"></div>
    </div>

    <div class="pokemon-name shimmer" id="name">bulbasaur</div>
    <div class="pokemon-name-ja shimmer" id="name-ja">フシギダネ</div>

    <div class="image-wrap">
      <div class="pokeball-bg"></div>
      <img class="pokemon-image hidden" id="img" src="" alt="">
    </div>

    <div class="stats-title">Base Stats</div>
    <div class="stats" id="stats">
      <!-- filled by JS -->
    </div>

    <div class="info-row" id="info"></div>

    <div class="btn-wrap">
      <div class="btn-glow" id="btn-glow"></div>
      <button class="btn" id="btn" onclick="fetchRandom()">ランダムを表示</button>
    </div>
  </div>

  <script>
    const TOTAL = 1025;

    const TYPE_COLORS = {
      normal:'#9099a1', fire:'#ff9c54', water:'#4d90d5', electric:'#f3d23b',
      grass:'#63bc5a', ice:'#74cec0', fighting:'#ce406a', poison:'#ab6ac8',
      ground:'#d97845', flying:'#8fa8dd', psychic:'#f97176', bug:'#91c12f',
      rock:'#c7b78b', ghost:'#5269ac', dragon:'#0a6dc4', dark:'#5a5465',
      steel:'#5a8ea2', fairy:'#ec8fe6',
    };

    const STAT_LABELS = {
      hp:'HP', attack:'攻撃', defense:'防御',
      'special-attack':'特攻', 'special-defense':'特防', speed:'素早さ',
    };

    function setTypeTheme(types) {
      const c1 = TYPE_COLORS[types[0]] || '#7c7cff';
      const c2 = TYPE_COLORS[types[1]] || c1;
      document.documentElement.style.setProperty('--type1', c1);
      document.documentElement.style.setProperty('--type2', c2);
    }

    async function fetchRandom() {
      const btn = document.getElementById('btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>読み込み中...';

      const id = Math.floor(Math.random() * TOTAL) + 1;

      // Hide image during load
      const img = document.getElementById('img');
      img.classList.replace('visible', 'hidden');

      // Shimmer placeholders
      document.getElementById('name').classList.add('shimmer');
      document.getElementById('name-ja').classList.add('shimmer');

      try {
        const [pokRes, spcRes] = await Promise.all([
          fetch(`https://pokeapi.co/api/v2/pokemon/${id}`),
          fetch(`https://pokeapi.co/api/v2/pokemon-species/${id}`),
        ]);
        render(await pokRes.json(), await spcRes.json());
      } catch {
        btn.textContent = 'エラー。再試行';
        btn.disabled = false;
      }
    }

    function render(p, sp) {
      // Types first (for theme)
      const typeNames = p.types.map(t => t.type.name);
      setTypeTheme(typeNames);

      document.getElementById('number').textContent = `#${String(p.id).padStart(4,'0')}`;

      const nameEl = document.getElementById('name');
      nameEl.textContent = p.name;
      nameEl.classList.remove('shimmer');

      const jaEl = document.getElementById('name-ja');
      const ja = sp.names.find(n => n.language.name === 'ja-Hrkt') || sp.names.find(n => n.language.name === 'ja');
      jaEl.textContent = ja ? ja.name : '';
      jaEl.classList.remove('shimmer');

      // Types
      document.getElementById('types').innerHTML = typeNames
        .map(t => `<span class="type-badge type-${t}">${t}</span>`)
        .join('');

      // Image
      const imgEl = document.getElementById('img');
      const src = p.sprites?.other?.['official-artwork']?.front_default || p.sprites?.front_default;
      if (src) {
        const tmp = new Image();
        tmp.onload = () => {
          imgEl.src = src;
          imgEl.alt = p.name;
          imgEl.style.imageRendering = src.includes('official-artwork') ? 'auto' : 'pixelated';
          imgEl.classList.replace('hidden', 'visible');
        };
        tmp.src = src;
      }

      // Stats
      document.getElementById('stats').innerHTML = p.stats.slice(0,6).map(s => {
        const label = STAT_LABELS[s.stat.name] || s.stat.name;
        const pct = Math.min(100, Math.round(s.base_stat / 255 * 100));
        return `
          <div class="stat-row">
            <div class="stat-label">${label}</div>
            <div class="stat-value">${s.base_stat}</div>
            <div class="stat-bar-wrap"><div class="stat-bar" style="width:0%" data-pct="${pct}"></div></div>
          </div>`;
      }).join('');

      // Animate bars after paint
      requestAnimationFrame(() => requestAnimationFrame(() => {
        document.querySelectorAll('.stat-bar').forEach(b => {
          b.style.width = b.dataset.pct + '%';
        });
      }));

      // Info
      document.getElementById('info').innerHTML = `
        <div class="info-item">
          <div class="info-label">たかさ</div>
          <div class="info-value">${(p.height/10).toFixed(1)} m</div>
        </div>
        <div class="info-item">
          <div class="info-label">おもさ</div>
          <div class="info-value">${(p.weight/10).toFixed(1)} kg</div>
        </div>
        <div class="info-item">
          <div class="info-label">ぜんこく</div>
          <div class="info-value">#${p.id}</div>
        </div>`;

      const btn = document.getElementById('btn');
      btn.textContent = 'つぎのポケモン →';
      btn.disabled = false;
    }

    fetchRandom();
  </script>
</body>
</html>
